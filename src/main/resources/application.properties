spring.application.name=productservice2402
productService = "fakeStoreProductService"

# Allow Hibernate to create/update DB schema to avoid Schema-validation missing table errors
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.datasource.url=jdbc:mysql://localhost:3306/productservice2402
spring.datasource.username=dbuserproductservice2402
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# If the database schema already contains tables, initialize Flyway's schema history instead of failing
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
